name: Quant Data Scraper

on:
  schedule:
    # 매주 월~금, 한국 시간 오후 4시 30분 (UTC 기준 07:30)에 자동 실행
    - cron: '30 7 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 google-generativeai yfinance

      - name: Run Scraper
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🔥 [V9.0] 포트폴리오 백테스트용 CSV 파일 2개가 추가되었습니다!
          git add data.csv history.csv report.md score_trend.csv portfolio.csv performance_trend.csv
          
          git commit -m "🤖 수급 데이터 갱신, AI 리포트 및 포트폴리오 성적 업데이트 완료" || exit 0
          git push
